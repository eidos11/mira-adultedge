# AE M1 Coaching Skills — Socratic questioning hybrid templates
#
# Design basis (4.7 domain review):
#   - Socratic guided discovery 3-stage: information → discrepancy → alternative
#     (Padesky CBT adaptation. action_invitation block serves as practical synthesis)
#   - MI (Miller & Rollnick): evoke change talk, roll with resistance
#   - PSR anchor: each pattern maps to a P/S/R stage for structural coaching
#   - Action invitation (not directive): "You might consider..." not "Do X / You must"
#
# Template blocks:
#   recognition: 1-2 sentences pattern awareness (what)
#   socratic_inquiry: 3 questions — information/discrepancy/alternative (why, how)
#   action_invitation: 1 concrete self-check suggestion (synthesis → what next)
#   self_monitor_signal: 1 sentence — what to notice when pattern recurs
#
# i18n note (improvement #3 draft): ko keys previously carried English text,
# which (combined with the verdict-gate collision) collapsed Korean reports
# to the safe fallback. English moved to en keys; ko keys now carry Korean.
# Korean strings are written gate-token-safe (no 확정/판정/진단 결과; no
# willpower-blame tokens outside quoted-reattribution contexts).

fluency_illusion:
  pattern_id: PAT-I-06
  vtype: I
  psr_coaching_target: P
  psr_coaching_focus: "Premise (P) — examine the basis of the premise 'I know this'"
  psr_coaching_focus_ko: "전제(P) — '나는 이걸 안다'는 전제의 근거를 점검"
  recognition:
    ko: "응답에서 학습 자료에 대한 친숙함을 이해의 근거로 삼는 경향이 관찰됩니다."
    en: "Your response suggests a tendency to treat familiarity with material as evidence of understanding."
  socratic_inquiry:
    - stage: information
      ko: "이 내용을 '안다'고 느꼈을 때, 그 느낌의 근거는 무엇이었나요? 여러 번 읽어 익숙해진 것인지, 스스로 설명할 수 있어서인지 구분해 볼 수 있을까요?"
      en: "When you feel you 'know' this material, what was the basis for that feeling? Could you try distinguishing whether it feels familiar because you have read it, or because you could explain it on your own?"
    - stage: discrepancy
      ko: "지금 책을 덮고 빈 종이에 핵심 내용을 적는다면, 어느 정도나 적을 수 있을까요?"
      en: "If you were to close the book right now and write down the key points on a blank page, how much would you be able to write?"
    - stage: alternative
      ko: "익숙함과 실제 인출 능력 사이에 차이가 있다면, 진짜 이해를 확인하기 위해 어떤 방법을 써볼 수 있을까요?"
      en: "If there is a gap between familiarity and actual retrieval ability, what methods might you use to verify genuine understanding?"
  action_invitation:
    ko: "다음 학습 후에 '인출 연습'을 시도해 보세요 — 한 단원을 읽고, 책을 덮고, 핵심 세 가지를 적어 보는 방식입니다."
    en: "After your next study session, you might try a 'retrieval practice' exercise — read a section, close the book, and write down the three key points."
  self_monitor_signal:
    ko: "'술술 읽힌다'는 느낌이 드는 순간이 이 패턴의 신호입니다 — '이걸 정말 알고 있나?'라고 자문해 보세요."
    en: "The moment you notice a feeling of 'this reads so smoothly' is the signal for this pattern — try asking yourself, 'Is this something I truly know?'"

false_dilemma:
  pattern_id: PAT-D-02
  vtype: D
  psr_coaching_target: S
  psr_coaching_focus: "Strategy (S) — examine whether the option space has been artificially narrowed"
  psr_coaching_focus_ko: "전략(S) — 선택지 공간이 인위적으로 좁혀졌는지 점검"
  recognition:
    ko: "응답에서 선택지가 두 가지로 좁혀진 구조가 관찰됩니다."
    en: "Your reasoning appears to narrow the option space to two alternatives."
  socratic_inquiry:
    - stage: information
      ko: "지금 고려 중인 두 가지 선택지는 무엇인가요? 그 둘이 정말 전부인지, 놓치고 있는 가능성은 없는지 잠시 생각해 볼 수 있을까요?"
      en: "What are the two options you are currently considering? Could you take a moment to think about whether those two are truly all the possibilities, or if there might be something you are overlooking?"
    - stage: discrepancy
      ko: "두 선택지 사이의 중간 지점이나, 전혀 다른 접근이 있다면 무엇이 떠오르나요?"
      en: "If there could be a middle ground between these two options, or an entirely different approach, what comes to mind?"
    - stage: alternative
      ko: "반드시 세 번째 선택지를 하나 만들어야 한다면, 무엇을 시도해 볼 수 있을까요?"
      en: "If you absolutely had to come up with a third option, what might you try?"
  action_invitation:
    ko: "'이것 아니면 저것'이라는 생각이 들 때, 먼저 '작은 실험 하나'를 설계해 보세요."
    en: "When you catch yourself thinking 'it is either this or that,' you might try designing 'one small experiment' first."
  self_monitor_signal:
    ko: "'다른 방법이 없다', '둘 중 하나다' 같은 표현이 이 패턴의 신호입니다."
    en: "Phrases like 'there is no other way' or 'it is one or the other' are the signals for this pattern."

oversimplified_cause:
  pattern_id: PAT-A-02
  vtype: A
  psr_coaching_target: R
  psr_coaching_focus: "Result (R) — examine whether the causal attribution has been reduced to a single cause"
  psr_coaching_focus_ko: "결과(R) — 인과 귀속이 단일 원인으로 축소되었는지 점검"
  recognition:
    ko: "응답에서 복합적인 상황의 원인을 하나로 줄이는 경향이 관찰됩니다."
    en: "Your explanation reduces a multi-factor situation to a single cause."
  socratic_inquiry:
    - stage: information
      ko: "지금 생각하는 원인은 무엇인가요? 그것을 유일한 원인으로 보는 근거는 무엇인가요?"
      en: "What cause are you currently thinking of? What is your basis for considering it the sole cause?"
    - stage: discrepancy
      ko: "그 원인을 완전히 제거하면 문제가 100% 해결될까요? 아니라면 어떤 다른 요인이 함께 작용하고 있을까요?"
      en: "If you were to completely remove that cause, would the problem be 100% solved? If not, what other factors might be at play?"
    - stage: alternative
      ko: "과제 난이도, 학습 방법, 시간 배분, 피드백 여부, 환경 중에서 실제로 영향을 준 다른 요인은 없을까요?"
      en: "Among task difficulty, study methods, time allocation, feedback availability, and environment, might there be another factor that actually contributed?"
  action_invitation:
    ko: "하나의 설명으로 정리하고 싶어질 때, '최소 세 가지 요인'을 적어 보는 연습을 해 보세요."
    en: "When you find yourself reaching for a single explanation, you might try the exercise of listing 'at least three factors.'"
  self_monitor_signal:
    ko: "문장이 '~ 때문이다'로 끝날 때가 이 패턴의 신호입니다 — '정말 그것뿐일까?'라고 자문해 보세요."
    en: "When your sentence ends with 'it is because of...,' that is the signal for this pattern — try asking yourself, 'Is that really the only cause?'"

sunk_cost:
  pattern_id: PAT-I-04
  vtype: I
  psr_coaching_target: R
  psr_coaching_focus: "Result (R) — examine whether past investment, rather than future expected value, is being used as the basis for a decision"
  psr_coaching_focus_ko: "결과(R) — 결정의 근거가 미래 기대가치가 아니라 과거 투입인지 점검"
  recognition:
    ko: "응답에서 이미 들인 시간이나 노력을 현재 전략을 계속할 주된 근거로 삼는 경향이 관찰됩니다."
    en: "Your reasoning uses past investment as justification for continuing a strategy with uncertain future value."
  socratic_inquiry:
    - stage: information
      ko: "지금까지 들인 것 중에서 무엇을 내려놓기가 가장 어렵게 느껴지나요?"
      en: "Of everything you have invested so far, what feels most difficult to let go of?"
    - stage: discrepancy
      ko: "만약 지금까지 아무것도 들이지 않았다고 상상한다면, 같은 선택을 하시겠어요?"
      en: "If you imagined that you had invested nothing up to this point, would you make the same choice?"
    - stage: alternative
      ko: "앞으로 2주만 본다면, 지금 방식을 계속하는 것과 새로운 방식을 시도하는 것 중 어느 쪽의 이득이 클까요?"
      en: "Looking only at the next two weeks, which would return more — continuing with the current approach or trying a new one?"
  action_invitation:
    ko: "중요한 결정 앞에서 '지금 이 지점부터 앞만 본다면?'이라는 질문을 먼저 던져 보세요."
    en: "When facing an important decision, you might try asking yourself the question 'If I look only at what is ahead from this point?' first."
  self_monitor_signal:
    ko: "'여기까지 왔는데', '이만큼 들였는데' 같은 표현이 이 패턴의 신호입니다."
    en: "Phrases like 'I have come this far' or 'I have already put in so much' are the signals for this pattern."

effort_heuristic:
  pattern_id: PAT-I-07
  vtype: I
  psr_coaching_target: P
  psr_coaching_focus: "Premise (P) — examine whether the fact of 'having worked hard' is being used as evidence for 'having improved'"
  psr_coaching_focus_ko: "전제(P) — '열심히 했다'는 사실이 '늘었다'의 근거로 쓰이는지 점검"
  recognition:
    ko: "응답에서 들인 시간과 활동의 양을 학습 성과의 직접 근거로 삼는 경향이 관찰됩니다."
    en: "Your self-assessment appears to equate effort quantity with capability improvement."
  socratic_inquiry:
    - stage: information
      ko: "최근 학습에서 가장 많은 시간을 쓴 활동은 무엇인가요? 그 활동으로 구체적으로 무엇이 달라졌나요?"
      en: "What activity took the most time in your recent studying? What specifically changed as a result of that activity?"
    - stage: discrepancy
      ko: "'열심히 했다'와 '늘었다' 사이에 차이가 있을 수 있다면, 둘을 어떻게 구분할 수 있을까요?"
      en: "If there can be a difference between 'having worked hard' and 'having improved,' how might you distinguish between the two?"
    - stage: alternative
      ko: "같은 시간을 쓰더라도, 실제 변화를 더 잘 확인할 수 있는 연습 방식은 무엇일까요?"
      en: "Even with the same amount of time, what kind of practice method might help you better confirm actual change?"
  action_invitation:
    ko: "학습 후 '오늘 무엇이 달라졌나?'를 한 문장으로 적어 보세요. 적을 수 없다면 연습 방식을 점검할 신호일 수 있습니다."
    en: "After studying, you might try writing in one sentence: 'What is different today?' If you find you cannot, that could be a signal to review your practice method."
  self_monitor_signal:
    ko: "'이만큼 했으니 괜찮겠지'라는 느낌이 드는 순간이 이 패턴의 신호입니다."
    en: "The moment you feel 'I worked hard, so it is probably fine' is the signal for this pattern."

willpower_blame:
  pattern_id: PAT-DUAL-01
  vtype: A
  psr_coaching_target: R
  psr_coaching_focus: "Result (R) — examine whether the cause of failure is being attributed to character or willpower deficits, thereby blocking structural improvement pathways"
  psr_coaching_focus_ko: "결과(R) — 실패 원인을 성격 문제로 돌려 구조적 개선 경로가 막히는지 점검"
  recognition:
    ko: "응답에서 학습의 어려움을 성격이나 자기 통제의 문제로 돌리는 경향이 관찰됩니다."
    en: "Your self-assessment attributes learning difficulties to character or willpower deficits rather than structural factors."
  socratic_inquiry:
    - stage: information
      ko: "지금 겪는 어려움에서, 자신을 탓하는 설명 외에 고려해 본 다른 요인이 있나요?"
      en: "In the situation you are struggling with now, have you considered any factors other than 'I am lazy' or 'I lack willpower'?"
    - stage: discrepancy
      ko: "같은 사람이 다른 환경 — 더 명확한 과제, 더 짧은 단위, 즉각적인 피드백 — 에 있었다면 결과가 달라질 수 있었을까요?"
      en: "If a person with the same willpower were in a different environment — say, with clearer tasks, shorter units, or immediate feedback — could the outcome be different?"
    - stage: alternative
      ko: "성격 대신, 과제 구조·시간 배분·피드백 여부·학습 방법 중에서 실제로 바꿀 수 있는 것은 무엇일까요?"
      en: "Instead of willpower, which of the following could you actually change: task structure, time allocation, feedback availability, or study method?"
  action_invitation:
    ko: "자신을 탓하게 될 때, '구조에서 바꿀 수 있는 것 하나'를 먼저 찾아 적어 보세요."
    en: "When the thought 'I am just lazy' comes up, you might try rephrasing the question to 'What structural change could help?'"
  self_monitor_signal:
    ko: "'나는 원래 이런 사람'이라는 문장으로 끝나는 순간이 이 패턴의 신호입니다 — 성격이 아니라 환경 변수를 먼저 찾아보세요."
    en: "Phrases like 'that is just how I am' or 'I lack the willpower' are the signals for this pattern — try looking for environmental variables rather than blaming character."
  compound_alert: "High co-occurrence rate with oversimplified_cause. When detected simultaneously, apply the structural-reattribution protocol — reattribute from character-based explanation to structural variables."
