# Pattern Registry (Canonical SSOT)
# ------------------------------------------------------------------------------
# THEORETICAL FOUNDATION
#
# This specification is grounded in an original theoretical framework developed
# by the project founder (Mnemo), NOT derived from existing cognitive science
# traditions. Three core theoretical documents underlie this spec:
#   - Doc 0: Human and civilization (ontological base; hypothesis-based judgment,
#             basic emotions, deception taxonomy)
#   - Doc 1: Hypothesis-based judgment (mechanism of judgment formation,
#             self/other deception, falsification/concealment)
#   - Doc 2: Sensation, memory, imagination (4-layer diagnostic model)
#
# These documents are not publicly distributed. For theoretical clarifications,
# contact the founder directly.
#
# KEY SCOPE DECLARATIONS:
#
# 4-layer model (cognitive_layers) - diagnostic dimension for learner
# self-report, NOT a cognitive processing theory. The ordering
# (sensory -> memory -> imagination -> reasoning) reflects how learners
# mis-identify their own attainment level, not a neural processing sequence.
#
# hypothesis-based judgment - a founder-original concept distinct from
# Popper's scientific theory-testing method. Refers to the human cognitive
# mechanism by which judgment forms on insufficient evidence, driven by
# intent. Academic parallels (Peirce's abduction, Bayesian reasoning) are
# reference anchors only, not primary sources.
#
# concealment / falsification - a founder-original binary taxonomy of
# deception mechanisms. "Falsification" here is NOT Popper's scientific
# testability principle. It denotes transformation-based deception
# (fabrication, manipulation, interpretive distortion), contrasted with
# concealment (omission-based deception). Alternative label: "alteration"
# (emphasizes modification of existing content; see Doc 0 deception section
# for full scope).
#
# adaptive_function framework - patterns are analyzed at two levels:
# individual cognitive misfire AND social-evolutionary adaptive origin.
# Both levels are necessary for full diagnostic and intervention design.
#
# ACADEMIC PARALLELS throughout this spec serve as reference anchors and
# secondary validation. The author's original framework (PSR) is the
# design-theory source for these pattern definitions; empirical claims remain
# open to external validation.
#
# For extended theoretical explanation, see VISION.md (research foundation).
# ------------------------------------------------------------------------------
# Decision: DEC-2026-04-24-EVAL-REGISTRY01
# Resolves: ISS-02 17/19/21 taxonomy ambiguity (Codex deep review 2026-04-23)
# Authority: shared by Lane 1 Contract Critic, Lane 2 Fixture Critic, Lane 3 Shadow Critic
# Last updated: 2026-04-24

