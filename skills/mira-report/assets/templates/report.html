<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIRA Diagnostic Report</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 760px; margin: 2rem auto; padding: 0 1rem;
    line-height: 1.65; color: #1a1a1a;
  }
  h1 { font-size: 1.5rem; }
  h2 {
    border-bottom: 2px solid #ebedf0; padding-bottom: .3rem;
    margin-top: 2.2rem; font-size: 1.3rem;
  }
  h3 { color: #2c5282; font-size: 1.05rem; margin-top: 1.4rem; }
  blockquote {
    border-left: 4px solid #cbd5e0; margin: .8rem 0;
    padding: .2rem 1rem; color: #4a5568;
  }
  hr { border: none; border-top: 1px solid #ebedf0; margin: 1.6rem 0; }
  ul { padding-left: 1.4rem; }
  li { margin: .2rem 0; }
  strong { color: #1a202c; }
  .footer {
    margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #ebedf0;
    font-size: .82rem; color: #888;
  }
  .report-section { margin-top: 2rem; }
  mark.evidence {
    background: transparent; color: #0c8599;
    border-bottom: 2px solid #0c8599; font-weight: 600;
  }
  .badge {
    display: inline-block; font-size: .78rem; font-weight: 600;
    padding: .08rem .5rem; border-radius: 999px; margin-right: .45rem;
  }
  .badge-verified { background: #d3f9d8; color: #2b8a3e; }
  .badge-rejected { background: #ffe3e3; color: #c92a2a; }
  .badge-evidence_assisted { background: #fff3bf; color: #e67700; }
  .badge-unverified { background: #f1f3f5; color: #868e96; }
  .diagnosis-list { list-style: none; padding-left: 0; }
  .diagnosis-list li { margin: .4rem 0; }
  .verdict-unverified { opacity: .55; }
  .lane-badge {
    font-size: .7rem; font-weight: 400; background: #e7f0ff; color: #2c5282;
    padding: .05rem .45rem; border-radius: 4px; vertical-align: middle;
  }
  .gauge {
    background: #ebedf0; border-radius: 999px; height: .7rem;
    overflow: hidden; margin: .6rem 0;
  }
  .gauge-fill { background: #2c5282; height: 100%; transition: width .3s; }
  .psr { display: flex; flex-direction: column; gap: .45rem; }
  .psr-step {
    background: #f7f9fc; border-left: 3px solid #2c5282; padding: .45rem .75rem;
  }
  .psr-key { font-weight: 600; color: #2c5282; margin-right: .55rem; }
  .evidence-item { margin: .9rem 0; }
  .coaching-note { font-style: italic; color: #c07000; margin-bottom: .5rem; }
  .metadata { font-size: .85rem; color: #888; }
</style>
</head>
<body>
{{BODY}}
<p class="footer">Generated by MIRA AdultEdge · mira-report skill · self-contained report</p>
</body>
</html>
